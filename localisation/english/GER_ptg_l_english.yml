l_english:
######################## FOCUSES ########################

 GER_support_military_research:0 "Support Military Research"
 GER_support_military_research_desc:0 "We should save funds for military research"

 GER_cold_war:0 "Cold War"
 GER_cold_war_desc:0 "Our friendly looking enemy, the only force that prevents us from being a world power"

 GER_lebensraum_achieved:0 "Lebensraum Achieved"
 GER_lebensraum_achieved_desc:0 "At last we have succeeded, the German people have won their rightful land with blood, sweat and tears. Thanks to our Führer, we no longer have treaties imposed on us that dishonor us. Long live our great Führer. Heil Hitler."

 GER_the_new_order:0 "The New Order"
 GER_the_new_order_desc:0 "Now that the whole of Europe is at our feet, the rich resources of Europe and millions of humble slaves are ready to serve the great German race. As the great Germans who will lead these vast resources, NOW WE WILL CREATE THE NEW WORLD ORDER."

 GER_high_castle:0 "Man in the High Castle"
 GER_high_castle_desc:0 ""

 GER_oberkommando_des_heeres:0 "Oberkommando des Heeres"
 GER_oberkommando_des_heeres_desc:0 "Oberkommando des Heeres OKH is a Wehrmacht Army High Command. For the armed forces. Stronger OKH, for Germany!"

 GER_artillery_modernization:0 "Artillery Modernization"
 GER_artillery_modernization_desc:0 "The Treaty of Versailles sought to limit Germany's field artillery to just 284 pieces in total, but this laughable restriction is no obstacle to the Reich now. A powerful Germany needs a powerful Heer, and a powerful Heer needs modernized powerful guns!"

 GER_technocrats:0 "Technocracy"
 GER_technocrats_desc:0 ""

 GER_counter_armor:0 "Counter Armor"
 GER_counter_armor_desc:0 "Armour shouldn't be in our way. If we destroy what our opponents are counting on, no one can stand against us!"

 GER_Standard_panzer:0 "Standard Panzer"
 GER_Standard_panzer_desc:0 "German tanks were an important part of the Wehrmacht and played a fundamental role during the whole war, and especially in the blitzkrieg battle strategy."

 GER_underground_mil_factories:0 "Underground Factories"
 GER_underground_mil_factories_desc:0 "We need to hide our militarization, allied forces must not find out" 

 GER_enigma_focus:0 "Enigma"
 GER_enigma_focus_desc:0 "The Enigma machine is our encryptor. It must be developed and used so that we can see what the enemy is doing and they cannot see what we are doing."

 GER_hermann_goring_ascended:0 "Hermann Göring Ascended"
 GER_hermann_goring_ascended_desc:0 "Since Hermann Göring was the pioneer of the development of the German economy, the leader of the Luftwaffe and Hitler's right-hand man, his rise was inevitable. Long live our new führer."

 GER_heinrich_himmler_ascended:0 "Heinrich Himmler Ascended"
 GER_heinrich_himmler_ascended_desc:0 "Himmler's rise as the leader of important organizations such as the SS, the Gestapo and the man after Hitler is inevitable. Long live the new führer."

 GER_increase_the_air_force_budget:0 "Increase the Luftwaffe's Budget"
 GER_increase_the_air_force_budget_desc:0 "The Luftwaffe needs to achieve technological superiority in order to deal with the world powers. Faster, more powerful, better maneuverable planes can leave the whole sky under German control. But for this, the Luftwaffe budget needs to be increased"

 GER_strengthen_heavy_industry:0 "Strengthen Heavy Industry"
 GER_strengthen_heavy_industry_desc:0 "The world is being dragged into a new war and Führer Heinrich Himmler is aware of this. In order for our country to stand on its feet, our heavy industry must be strengthened as soon as possible."

 GER_wuffafe:0 "Expand Luftwaffe"
 GER_wuffafe_desc:0 "Modern warfare depends on the success of the air force, but the Luftwaffe is currently not strong enough to fight the world powers and needs to be strengthened. For this we need to increase technological investments."

 GER_new_militarsitc_leadership:0 "Prussian Militarism"
 GER_new_militarsitc_leadership_desc:0 "Hermann Göring is a tough and strong man, raised in Prussian discipline. That's why he knows what it means to be a Prussian and will make our army highly disciplined like it used to be."

 GER_second_four_year_plan:0 "Second Four-Year Plan"
 GER_second_four_year_plan_desc:0 "We have successfully completed our first four-year plan and we have taken our country's industry to the top. Now we have the second five-year plan, so we will achieve even better things than we did the previous time and we will achieve the industry that will take the great German nation forward."

 GER_operation_taifun:0 "Unternehmen Taifun"
 GER_operation_taifun_desc:0 "We planned this war long ago, now it's time to activate it."

 GER_standard_panzer:0 "Standard Panzer"

 GER_volkssturm:0 "Volkssturm"
 GER_volkssturm_desc:0 "Volkssturm, II. People's Liberation Army, formed from German men by order of Adolf Hitler in the last months of World War II. Although the organization's militias were between 16 and 60 years old, there was no requirement to have previously received military training in the army."

 GER_volunteer_workers:0 "Volunteer Workers"
 GER_volunteer_workers_desc:0 "In Germany, the tradition of voluntary service goes back to the 19th century. Today, forty four per cent of all Germans over the age of 14 work on a volunteer basis for their communities. Their reasons for getting involved and the experiences they have are as varied as the tasks they take upon themselves."

 GER_himmler_army:0 "Himmler's Army"

 GER_kommissariat_burgundy:0 "Kommissariat Burgundy"
 GER_kommissariat_burgundy_desc:0 "Kommissariat Burgundy is one of the main objectives of Himmler. We must make it possible!" 

 GER_the_vanguard_of_fascism:0 "Vanguard of True Fascism"
 GER_the_vanguard_of_fascism_desc:0 "With all of our achievements the Reich embodies the vanguard of true fascism"

 GER_bavaria_is_the_new_austria:0 "Bavaria is the New Austria"
 GER_bavaria_is_the_new_austria_desc:0 "If Austria is not willing to cooperate with us, we must invest into our loyal regions of Bavaria."

 GER_upgrade_civilian_industry:0 "Rebuild Civilian Industry"
 GER_upgrade_civilian_industry_desc:0 "Rebuilding our industry after the civil war is essential for the survival of our economy."

 GER_upgrade_military_industry:0 "Rebuild Military Industry" 
 GER_upgrade_military_desc:0 "Rebuilding our industry after the civil war is essential for the survival of our economy."
 
 